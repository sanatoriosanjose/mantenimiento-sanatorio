<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantenimiento — Sanatorio v2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --navy:   #0f1c2e;
  --navy2:  #162438;
  --navy3:  #1e3251;
  --steel:  #2a4a6b;
  --blue:   #2d7dd2;
  --cyan:   #0fb8c9;
  --green:  #27ae60;
  --amber:  #f39c12;
  --red:    #e74c3c;
  --text:   #e8eef4;
  --text2:  #8da4bc;
  --text3:  #4d6a85;
  --border: rgba(45,125,210,0.18);
  --card:   rgba(22,36,56,0.95);
  --font:   'IBM Plex Sans', sans-serif;
  --mono:   'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: var(--navy); color: var(--text); font-family: var(--font); font-size: 15px; }

/* ── LAYOUT ── */
#app { display: flex; height: 100vh; overflow: hidden; }
#sidebar {
  width: 220px; min-width: 220px; background: var(--navy2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column;
  transition: transform .25s;
}
#main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
#topbar {
  height: 52px; background: var(--navy2); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 20px; gap: 14px; flex-shrink: 0;
}
#content { padding: 24px; flex: 1; }

/* ── SIDEBAR ── */
.logo {
  padding: 18px 16px 14px;
  border-bottom: 1px solid var(--border);
}
.logo-title {
  font-size: 13px; font-weight: 600; letter-spacing: .08em;
  color: var(--cyan); text-transform: uppercase;
}
.logo-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.nav-section { padding: 10px 0; border-bottom: 1px solid var(--border); }
.nav-label { font-size: 10px; letter-spacing: .12em; color: var(--text3); text-transform: uppercase; padding: 6px 16px 4px; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 16px; cursor: pointer; font-size: 13px; color: var(--text2);
  transition: background .15s, color .15s; border-left: 2px solid transparent;
}
.nav-item:hover { background: rgba(45,125,210,.1); color: var(--text); }
.nav-item.active { background: rgba(45,125,210,.15); color: var(--cyan); border-left-color: var(--cyan); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.badge-count {
  margin-left: auto; background: var(--red); color: #fff;
  font-size: 10px; font-weight: 600; padding: 1px 6px; border-radius: 10px;
}
.user-info {
  margin-top: auto; padding: 14px 16px; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text2);
}
.user-name { color: var(--text); font-weight: 500; font-size: 13px; }
.user-role { font-size: 11px; color: var(--text3); }
.btn-logout {
  margin-top: 8px; font-size: 11px; color: var(--text3); cursor: pointer;
  text-decoration: underline; background: none; border: none; color: var(--text3);
}
.btn-logout:hover { color: var(--red); }

/* ── TOPBAR ── */
.topbar-title { font-weight: 500; font-size: 15px; }
.topbar-time { margin-left: auto; font-family: var(--mono); font-size: 13px; color: var(--text2); }
.hamburger { display: none; background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; }

/* ── CARDS ── */
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 8px; padding: 20px;
}
.card-title { font-size: 13px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase; color: var(--cyan); margin-bottom: 16px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }

/* ── STAT CHIPS ── */
.stat-chip { background: var(--navy3); border: 1px solid var(--border); border-radius: 8px; padding: 16px; text-align: center; }
.stat-num { font-family: var(--mono); font-size: 28px; font-weight: 500; }
.stat-label { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: .07em; }

/* ── FORMS ── */
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; color: var(--text2); margin-bottom: 5px; display: block; text-transform: uppercase; letter-spacing: .06em; }
input, select, textarea {
  width: 100%; background: var(--navy3); border: 1px solid var(--border);
  color: var(--text); font-family: var(--font); font-size: 14px;
  padding: 9px 12px; border-radius: 6px; outline: none;
  transition: border-color .15s;
}
input:focus, select:focus, textarea:focus { border-color: var(--cyan); }
textarea { resize: vertical; min-height: 80px; }
select option { background: var(--navy2); }

/* ── BUTTONS ── */
.btn {
  padding: 9px 20px; border-radius: 6px; font-family: var(--font);
  font-size: 13px; font-weight: 500; cursor: pointer; border: none;
  transition: opacity .15s, transform .1s; display: inline-flex; align-items: center; gap: 6px;
}
.btn:hover { opacity: .85; }
.btn:active { transform: scale(.98); }
.btn-primary { background: var(--blue); color: #fff; }
.btn-success { background: var(--green); color: #fff; }
.btn-warning { background: var(--amber); color: #000; }
.btn-danger { background: var(--red); color: #fff; }
.btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text2); }
.btn-sm { padding: 5px 12px; font-size: 12px; }

/* ── TABLES ── */
.tbl-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: var(--navy3); color: var(--text2); font-size: 11px; text-transform: uppercase; letter-spacing: .07em; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); }
td { padding: 9px 12px; border-bottom: 1px solid rgba(45,125,210,.08); vertical-align: top; }
tr:hover td { background: rgba(45,125,210,.05); }

/* ── BADGES ── */
.badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.badge-pending { background: rgba(243,156,18,.15); color: var(--amber); }
.badge-active  { background: rgba(45,125,210,.18); color: #67aaff; }
.badge-done    { background: rgba(39,174,96,.15);  color: #5ad98a; }
.badge-urgent  { background: rgba(231,76,60,.18);  color: #ff7e6b; }
.badge-info    { background: rgba(15,184,201,.12); color: var(--cyan); }
.badge-off     { background: rgba(77,106,133,.2);  color: var(--text3); }

/* ── RONDA CHECKLIST ── */
.ronda-section { margin-bottom: 20px; }
.ronda-section-title {
  font-size: 12px; text-transform: uppercase; letter-spacing: .08em;
  color: var(--cyan); background: var(--navy3); padding: 7px 12px;
  border-radius: 4px; margin-bottom: 8px;
}
.ronda-item {
  display: grid; grid-template-columns: 20px 1fr 160px 1fr;
  gap: 8px; align-items: center;
  padding: 7px 0; border-bottom: 1px solid rgba(45,125,210,.07);
  font-size: 13px;
}
.ronda-item input[type=checkbox] { width: 16px; height: 16px; accent-color: var(--cyan); }
.ronda-result select { padding: 4px 8px; font-size: 12px; }

/* ── LOGIN ── */
#login-screen {
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; background: var(--navy);
}
.login-card {
  background: var(--navy2); border: 1px solid var(--border);
  border-radius: 12px; padding: 40px 36px; width: 360px;
}
.login-logo { text-align: center; margin-bottom: 28px; }
.login-logo-icon { font-size: 36px; margin-bottom: 8px; }
.login-logo-title { font-size: 16px; font-weight: 600; color: var(--cyan); }
.login-logo-sub { font-size: 12px; color: var(--text3); margin-top: 3px; }
.pin-display {
  font-family: var(--mono); font-size: 32px; letter-spacing: .25em;
  text-align: center; padding: 14px; background: var(--navy3);
  border-radius: 6px; margin-bottom: 16px; min-height: 58px;
  color: var(--cyan);
}
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
.pin-btn {
  padding: 14px; text-align: center; background: var(--navy3);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 18px; font-weight: 500; cursor: pointer; color: var(--text);
  transition: background .1s, border-color .1s;
}
.pin-btn:hover { background: var(--steel); border-color: var(--cyan); }
.role-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
.role-btn {
  padding: 12px; text-align: center; background: var(--navy3);
  border: 1px solid var(--border); border-radius: 6px;
  font-size: 13px; cursor: pointer; color: var(--text2);
  transition: all .15s;
}
.role-btn.active { border-color: var(--cyan); color: var(--cyan); background: rgba(15,184,201,.08); }
.login-error { color: var(--red); font-size: 12px; text-align: center; margin-top: 8px; }

/* ── NOVEDAD URGENTE ── */
.novedad-strip {
  margin-bottom: 16px; background: rgba(231,76,60,.08);
  border: 1px solid rgba(231,76,60,.3); border-radius: 6px;
  padding: 12px 16px;
}
.novedad-strip-title { font-size: 11px; text-transform: uppercase; letter-spacing: .07em; color: var(--red); margin-bottom: 6px; }
.novedad-row { font-size: 12px; color: var(--text2); padding: 2px 0; }

/* ── CHARTS ── */
.charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
.chart-box { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 16px; }
.chart-box canvas { max-height: 200px; }

/* ── TABS ── */
.tabs { display: flex; gap: 2px; margin-bottom: 20px; background: var(--navy3); border-radius: 6px; padding: 3px; }
.tab-btn {
  flex: 1; padding: 8px; text-align: center; font-size: 12px; font-weight: 500;
  cursor: pointer; border-radius: 4px; color: var(--text2); transition: all .15s;
  background: none; border: none; font-family: var(--font);
}
.tab-btn.active { background: var(--navy2); color: var(--cyan); }

/* ── SECTION HEADER ── */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.section-title { font-size: 18px; font-weight: 500; }
.section-sub { font-size: 12px; color: var(--text2); margin-top: 2px; }

/* ── ALERT ── */
.alert { padding: 10px 14px; border-radius: 6px; font-size: 13px; margin-bottom: 14px; }
.alert-info    { background: rgba(15,184,201,.1);  border: 1px solid rgba(15,184,201,.25); color: var(--cyan); }
.alert-warning { background: rgba(243,156,18,.1);  border: 1px solid rgba(243,156,18,.25); color: var(--amber); }
.alert-danger  { background: rgba(231,76,60,.1);   border: 1px solid rgba(231,76,60,.3);  color: var(--red); }
.alert-success { background: rgba(39,174,96,.1);   border: 1px solid rgba(39,174,96,.25); color: var(--green); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.6); z-index: 100;
  display: flex; align-items: center; justify-content: center; padding: 20px;
}
.modal-box {
  background: var(--navy2); border: 1px solid var(--border); border-radius: 10px;
  padding: 24px; width: 100%; max-width: 500px; max-height: 85vh; overflow-y: auto;
}
.modal-title { font-size: 15px; font-weight: 600; margin-bottom: 18px; }
.modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

/* ── OBLEAS ── */
.oblea-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid rgba(45,125,210,.08);
  font-size: 13px;
}
.oblea-item:last-child { border-bottom: none; }

/* ── RESPONSIVE ── */
@media (max-width: 700px) {
  #sidebar { position: fixed; left: 0; top: 0; bottom: 0; z-index: 50; transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  .hamburger { display: block; }
  .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
  .charts-row { grid-template-columns: 1fr; }
  #content { padding: 16px; }
}

/* ── NOTIFICACION BANNER ── */
@keyframes slideIn {
  from { transform: translateX(120%); opacity:0; }
  to   { transform: translateX(0);    opacity:1; }
}

/* ── MISC ── */
.sep { border: none; border-top: 1px solid var(--border); margin: 20px 0; }
.text-muted { color: var(--text2); font-size: 13px; }
.text-mono { font-family: var(--mono); }
.flex-row { display: flex; gap: 10px; align-items: flex-start; flex-wrap: wrap; }
.mb-4 { margin-bottom: 4px; }
.mb-8 { margin-bottom: 8px; }
.mb-16 { margin-bottom: 16px; }
.mb-20 { margin-bottom: 20px; }
.mt-8 { margin-top: 8px; }
.vencida { color: var(--red); font-weight: 600; }
.sin-registro { color: var(--amber); font-weight: 600; }
.vigente { color: var(--green); }
</style>
</head>
<body>

<!-- ── LOGIN SCREEN ── -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">🏥</div>
      <div class="login-logo-title">MANTENIMIENTO</div>
      <div class="login-logo-sub">Sistema de gestión — Sanatorio</div>

    </div>

<!-- ── MAIN APP ── -->
<div id="app" style="display:none">
  <nav id="sidebar">
    <div class="logo">
      <div class="logo-title">🏥 Mantenimiento</div>
      <div class="logo-sub">Sistema de gestión</div>
    </div>
    <div id="nav-links"></div>
    <div class="user-info">
      <div class="user-name" id="user-name-display">—</div>
      <div class="user-role" id="user-role-display">—</div>
      <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
    </div>
  </nav>

  <div id="main">
    <div id="topbar">
      <button class="hamburger" onclick="toggleSidebar()">☰</button>
      <span class="topbar-title" id="topbar-title">Dashboard</span>
      <span class="topbar-time" id="clock">—</span>
    </div>
    <div id="content"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — REEMPLAZAR CON TU URL DE GOOGLE APPS SCRIPT
// ═══════════════════════════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycbwDUsEjROG4UkF6pyn-ZeBkEG6xGctg5x4tl2vb7ZScVQj3iLdDJVOsviL3TxykMgL0/exec";

// Todos los PINs se validan contra Google Sheets — no hay PINs hardcodeados
const PINS_DEMO = {}; // vacío — toda validación va al servidor

// ── STATE ────────────────────────────────────────────────────
let state = {
  role: null, nombre: null, legajo: null, servicio: null,
  pinBuffer: "", selectedRole: "servicio",
  pedidos: [], novedades: [], rondas: [],
  charts: {},
};

// ── CLOCK ────────────────────────────────────────────────────
function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById("clock").textContent =
      now.toLocaleDateString("es-AR") + " " + now.toLocaleTimeString("es-AR", {hour:"2-digit",minute:"2-digit"});
  }
  tick(); setInterval(tick, 10000);
}

// ── SISTEMA DE NOTIFICACIONES ────────────────────────────────
let notif_lastKnownIds = new Set();
let notif_initialized = false;
let notif_swRegistered = false;

function initNotifications() {
  if (notif_initialized) return;
  notif_initialized = true;

  // Pedir permiso de notificaciones del navegador
  if ("Notification" in window && Notification.permission === "default") {
    Notification.requestPermission().then(perm => {
      if (perm === "granted") registrarServiceWorker();
    });
  } else if ("Notification" in window && Notification.permission === "granted") {
    registrarServiceWorker();
  }

  // Polling cada 30 segundos — detecta pedidos nuevos mientras la app está abierta
  setInterval(checkNuevosPedidos, 30000);
  // Primera verificación a los 5 segundos de iniciar
  setTimeout(checkNuevosPedidos, 5000);
}

async function checkNuevosPedidos() {
  // Solo verificar si el usuario es operario o supervisor
  if (!state.role || state.role === "servicio" || state.role === "director") return;

  const data = await api({ action:"getPedidos" });
  if (!Array.isArray(data)) return;

  const pendientes = data.filter(p => p.Estado === "Pendiente");

  if (!notif_initialized) return;

  // Primera carga — solo registrar IDs sin alertar
  if (notif_lastKnownIds.size === 0 && pendientes.length > 0) {
    pendientes.forEach(p => notif_lastKnownIds.add(p.ID));
    actualizarBadge(pendientes.length);
    return;
  }

  // Detectar pedidos nuevos que no estaban antes
  const nuevos = pendientes.filter(p => !notif_lastKnownIds.has(p.ID));
  pendientes.forEach(p => notif_lastKnownIds.add(p.ID));
  actualizarBadge(pendientes.length);

  if (nuevos.length === 0) return;

  // Hay pedidos nuevos — alertar
  nuevos.forEach(p => {
    const msg = `Nuevo pedido de ${p.Servicio || "un servicio"}: ${(p.Descripcion || "").substring(0, 60)}`;
    reproducirSonido(p.Urgencia === "Alta");
    mostrarNotificacionVisual(msg, p.Urgencia);
    enviarNotificacionPush(msg, p.Urgencia);
  });

  // Actualizar badge
  const badge = document.getElementById("badge-pedidos");
  if (badge) badge.textContent = pendientes.length;
}

function actualizarBadge(cantidad) {
  const badge = document.getElementById("badge-pedidos");
  if (badge) badge.textContent = cantidad > 0 ? cantidad : "0";
  // Badge en pestaña del navegador
  if (cantidad > 0) {
    document.title = `(${cantidad}) Mantenimiento — Sanatorio`;
  } else {
    document.title = "Mantenimiento — Sanatorio";
  }
}

function reproducirSonido(urgente) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const beeps = urgente ? 3 : 1;
    for (let i = 0; i < beeps; i++) {
      setTimeout(() => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.frequency.value = urgente ? 880 : 660;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.4, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + 0.4);
      }, i * 500);
    }
  } catch(e) {
    console.warn("Audio error:", e);
  }
}

function mostrarNotificacionVisual(mensaje, urgencia) {
  // Eliminar notificación anterior si existe
  const anterior = document.getElementById("notif-banner");
  if (anterior) anterior.remove();

  const banner = document.createElement("div");
  banner.id = "notif-banner";
  banner.style.cssText = `
    position:fixed; top:60px; right:16px; z-index:999;
    background:${urgencia==="Alta"?"#e74c3c":"#2d7dd2"};
    color:#fff; padding:14px 18px; border-radius:8px;
    box-shadow:0 4px 20px rgba(0,0,0,.4);
    max-width:320px; font-size:13px; line-height:1.4;
    cursor:pointer; animation: slideIn .3s ease;
  `;
  banner.innerHTML = `
    <div style="font-weight:600;margin-bottom:4px">
      ${urgencia==="Alta"?"🔴":"🔔"} Nuevo pedido${urgencia==="Alta"?" — URGENTE":""}
    </div>
    <div>${mensaje}</div>

  `;
  banner.onclick = () => { banner.remove(); navigate("cola"); };

  }
}

function enviarNotificacionPush(mensaje, urgencia) {
  if (!("Notification" in window) || Notification.permission !== "granted") return;
  try {
    const n = new Notification("🏥 Mantenimiento — Nuevo pedido", {
      body: mensaje,
      icon: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏥</text></svg>",
      badge: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔔</text></svg>",
      tag: "pedido-nuevo",
      requireInteraction: urgencia === "Alta",
      vibrate: urgencia === "Alta" ? [200,100,200,100,200] : [200],
    });
    n.onclick = () => { window.focus(); navigate("cola"); n.close(); };
  } catch(e) {
    console.warn("Push notification error:", e);
  }
}

// Service Worker para notificaciones con app cerrada
function registrarServiceWorker() {
  if (notif_swRegistered || !("serviceWorker" in navigator)) return;
  notif_swRegistered = true;

  const swCode = `
    self.addEventListener('message', (e) => {
      if (e.data && e.data.type === 'NOTIFY') {
        self.registration.showNotification(e.data.title, {
          body: e.data.body,
          icon: e.data.icon || '',
          tag: 'pedido-nuevo',
          requireInteraction: e.data.urgente || false,
          vibrate: e.data.urgente ? [200,100,200,100,200] : [200],
          data: { url: e.data.url || '/' }
        });
      }
    });
    self.addEventListener('notificationclick', (e) => {
      e.notification.close();
      e.waitUntil(clients.openWindow(e.notification.data.url || '/'));
    });
    // Polling en background cada 60 segundos
    self.addEventListener('periodicsync', () => {});
  `;

  const blob = new Blob([swCode], { type:"application/javascript" });
  const swUrl = URL.createObjectURL(blob);

  navigator.serviceWorker.register(swUrl, { scope:"/" })
    .then(reg => {
      console.log("Service Worker registrado");
      // Guardar registro para enviar mensajes desde la app
      window._swReg = reg;
    })
    .catch(e => console.warn("SW error:", e));
}

// ── API ──────────────────────────────────────────────────────
function api(data) {
  return new Promise((resolve) => {
    const cbName = "cb_" + Date.now() + "_" + Math.floor(Math.random()*10000);
    const params = new URLSearchParams();
    Object.entries(data).forEach(([k, v]) => {
      params.append(k, typeof v === "object" ? JSON.stringify(v) : v);
    });
    params.append("callback", cbName);
    const script = document.createElement("script");
    const timer = setTimeout(() => {
      cleanup();
      resolve({ ok: false, error: "Timeout — verificar conexión con el servidor" });
    }, 15000);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(result) {
      cleanup();
      resolve(result);
    };
    script.src = API_URL + "?" + params.toString();
    script.onerror = function() {
      cleanup();
      resolve({ ok: false, error: "Error de red — verificar URL del servidor" });
    };
    document.head.appendChild(script);
  });
}

function pinPress(val) {
  if (val === "C") { state.pinBuffer = ""; renderPinDisplay(); return; }
  if (val === "OK") { attemptLogin(); return; }
  if (state.pinBuffer.length < 5) {
    state.pinBuffer += val;
    renderPinDisplay();
    if (state.pinBuffer.length === 5) attemptLogin();
  }
}

function renderPinDisplay() {
  const d = document.getElementById("pin-display");
  const buf = state.pinBuffer.padEnd(5, " ");
  d.textContent = buf.split("").map((c,i) => c.trim() ? "●" : "─").join(" ");
}

async function attemptLogin() {
  const pin = state.pinBuffer;
  const err = document.getElementById("login-error");
  err.textContent = "";
  err.textContent = "Verificando...";

  // Validar contra Google Sheets
  const res = await api({ action:"validarPIN", pin });

  if (res && res.ok) {
    state.role    = res.role    || "operario";
    state.nombre  = res.nombre  || res.servicio || "Usuario";
    state.legajo  = res.legajo  || "";
    state.servicio= res.servicio|| "";
    state.noOxigeno = res.noOxigeno || false;
    err.textContent = "";
    launchApp();
  } else {
    err.textContent = "PIN incorrecto. Verificar e intentar nuevamente.";
    state.pinBuffer = "";
    renderPinDisplay();
  }
}

  document.getElementById("login-screen").style.display = "none";

async function guardarRonda06() {
  const nivel = document.getElementById('g-nivel').value.trim();
  if (!nivel) { mostrarGasMsg('warning','⚠ Ingresar la lectura del reloj de oxígeno líquido.'); return; }

  const stock = {
    'Oxígeno medicinal': parseInt(document.getElementById('g-tox').value) || 0,
    'Aire comprimido': parseInt(document.getElementById('g-taire').value) || 0,
    'CO2': parseInt(document.getElementById('g-tco2').value) || 0,
    'Oxígeno transporte (camillero)': parseInt(document.getElementById('g-ttrans').value) || 0,
  };

  const btn = document.querySelector("button[onclick='guardarRonda06()']");
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  const res = await api({
    action: 'registrarRondaGas',
    operario: state.nombre,
    nivelTanque: nivel,
    stockTubos: JSON.stringify(stock),
    observaciones: document.getElementById('g-obs').value,
  });

  if (btn) { btn.disabled = false; btn.innerHTML = '💾 Registrar ronda 06:00'; }

  if (res && res.ok !== false) {
    // Verificar stock mínimo y alertar
    const alertas = [];
    Object.entries(stock).forEach(([tipo, cant]) => {
      if (STOCK_MINIMO[tipo] && cant < STOCK_MINIMO[tipo]) {
        alertas.push(`${tipo}: ${cant} (mínimo: ${STOCK_MINIMO[tipo]})`);
      }
    });

    if (alertas.length > 0) {
      mostrarGasMsg('warning',
        '✓ Ronda registrada.\n⚠ STOCK BAJO — Los siguientes tubos están por debajo del mínimo:\n' + alertas.join('\n') +
        '\n\nSe debe enviar correo a CASCIA solicitando reposición.');
      // Mostrar botón para enviar correo
      setTimeout(() => {
        const msgEl = document.getElementById('gas-msg');
        if (msgEl) {
          msgEl.innerHTML += '<div style="margin-top:12px">' +
            '<a href="mailto:' + EMAIL_CASCIA + '?subject=Solicitud%20de%20reposicion%20tubos' +
            '&body=Estimado%20equipo%20CASCIA%2C%0ASe%20solicita%20reposicion%20de%20gases.%0AQuedamos%20a%20disposicion.%0ASanatorio%20San%20Jose%0AMantenimiento' +
            '&reply-to=' + EMAIL_RESPUESTA + '" class="btn btn-warning" target="_blank">' +
            '📧 Enviar correo a CASCIA solicitando reposición</a></div>';
        }
      }, 100);
    } else {
      mostrarGasMsg('success', '✓ Ronda 06:00 registrada correctamente. Stock dentro de los mínimos.');
    }
    // Limpiar campos
    ['g-nivel','g-tox','g-taire','g-tco2','g-ttrans','g-obs'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
  } else {
    mostrarGasMsg('danger', '✗ Error al guardar: ' + (res?.error || 'verificar conexión'));
  }
}

function calcCarga() {
  const antes = parseFloat(document.getElementById('c-antes').value) || 0;
  const despues = parseFloat(document.getElementById('c-despues').value) || 0;
  const el = document.getElementById('c-cargado');
  if (antes > 0 && despues > 0 && despues > antes) {
    el.textContent = (despues - antes).toFixed(0) + ' unidades';
    el.style.color = 'var(--green)';
  } else {
    el.textContent = '—';
    el.style.color = 'var(--cyan)';
  }
}

async function guardarCargaTanque() {
  const chofer = document.getElementById('c-chofer').value.trim();
  const patente = document.getElementById('c-patente').value.trim();
  const antes = document.getElementById('c-antes').value.trim();
  const despues = document.getElementById('c-despues').value.trim();
  const remito = document.getElementById('c-remito').value.trim();
  if (!chofer || !patente || !antes || !despues || !remito) {
    mostrarGasMsg('warning','⚠ Completar todos los campos obligatorios (*)'); return;
  }
  const cargado = parseFloat(despues) - parseFloat(antes);

  const btn = document.querySelector("button[onclick='guardarCargaTanque()']");
  if (btn) { btn.disabled = true; btn.textContent = 'Guardando...'; }

  const res = await api({
    action: 'registrarCargaTanque',
    operario: state.nombre,
    chofer, patente,
    nivelAntes: antes,
    nivelDespues: despues,
    cantidadCargada: cargado.toFixed(0),
    remito,
    observaciones: document.getElementById('c-obs').value,
  });

  if (btn) { btn.disabled = false; btn.innerHTML = '💾 Registrar carga de tanque'; }

  if (res && res.ok !== false) {
    mostrarGasMsg('success',
      `✓ Carga registrada. Cantidad: ${cargado.toFixed(0)} unidades · Remito: ${remito}\n⚠ Recordar entregar el remito físico al Jefe de Mantenimiento.`);
    ['c-chofer','c-patente','c-antes','c-despues','c-remito','c-obs'].forEach(id => {
      const el = document.getElementById(id); if (el) el.value = '';
    });
    document.getElementById('c-cargado').textContent = '—';
  } else {
    mostrarGasMsg('danger', '✗ Error: ' + (res?.error || 'verificar conexión'));
  }
}

  c.innerHTML = '<div class="text-muted">Cargando stock...</div>';

  const stock = (data && data.ok !== false && data.stock) ? data.stock : {};
  const ultimaRonda = (data && data.ultimaRonda) ? data.ultimaRonda : null;

  const items = Object.entries(STOCK_MINIMO).map(function(entry) {
    const tipo = entry[0]; const minimo = entry[1];
    const cant = parseInt(stock[tipo]);
    const ok = !isNaN(cant) && cant >= minimo;
    const badge = isNaN(cant) ? 'badge-info' : ok ? 'badge-done' : 'badge-urgent';
    const label = isNaN(cant) ? 'Sin datos' : ok ? 'OK' : 'BAJO';

  const hayBajos = items.some(function(i) { return !i.ok && !isNaN(i.cant); });

  if (hayBajos) {
    alertaHtml = '<div class="alert alert-warning mb-16">⚠ Hay gases por debajo del stock mínimo. ' +

      '&reply-to=' + EMAIL_RESPUESTA + '" ' +
      'class="btn btn-warning btn-sm" style="margin-left:12px" target="_blank">📧 Enviar correo a CASCIA</a></div>';
  }

  let filasStock = '';

      '<td style="text-align:center;font-family:var(--mono);font-size:18px;padding:10px 6px;color:' + color + '">' + cantDisplay + '</td>' +
      '<td style="text-align:center;font-family:var(--mono);padding:10px 6px;color:var(--text2)">' + i.minimo + '</td>' +
      '<td style="text-align:center;padding:10px 6px"><span class="badge ' + i.badge + '">' + i.label + '</span></td>' +

      html += `<div class="novedad-strip">
        <div class="novedad-strip-title">📝 Últimas novedades de turno</div>

      </div>`;
    }

    if (html) strip.innerHTML = html;
  }
}

function drawCharts(stats) {
  const chartOpts = {
    responsive:true, maintainAspectRatio:true,
    plugins:{ legend:{ labels:{ color:"#8da4bc", font:{size:11} } } }
  };
  const COLORS = ["#2d7dd2","#f39c12","#27ae60","#e74c3c","#0fb8c9","#9b59b6"];

  // Estado
  const ctx1 = document.getElementById("chart-estado");
  if(ctx1) new Chart(ctx1, { type:"doughnut",
    data:{ labels:["Pendientes","En curso","Resueltos"], datasets:[{ data:[stats.pendientes||0, stats.enCurso||0, stats.resueltos||0], backgroundColor:["#f39c12","#2d7dd2","#27ae60"], borderWidth:0 }] },
    options:{...chartOpts} });

  // Urgencia
  const ctx2 = document.getElementById("chart-urgencia");
  const urgData = stats.porUrgencia || {};
  if(ctx2) new Chart(ctx2, { type:"pie",
    data:{ labels:Object.keys(urgData), datasets:[{ data:Object.values(urgData), backgroundColor:["#e74c3c","#f39c12","#27ae60"], borderWidth:0 }] },
    options:{...chartOpts} });

  // Por operario
  const ctx3 = document.getElementById("chart-operario");
  const opData = stats.porOperario || {};
  if(ctx3) new Chart(ctx3, { type:"bar",
    data:{ labels:Object.keys(opData), datasets:[{ label:"Trabajos", data:Object.values(opData), backgroundColor: Object.keys(opData).map((_,i)=>COLORS[i%COLORS.length]), borderWidth:0 }] },
    options:{ ...chartOpts, scales:{ x:{ticks:{color:"#8da4bc",font:{size:10}}}, y:{ticks:{color:"#8da4bc",font:{size:10}}, grid:{color:"rgba(45,125,210,.1)"}} }, plugins:{ legend:{display:false} } } });

  // Rondas
  const ctx4 = document.getElementById("chart-rondas");
  const rondasTotal = 37; // total items del checklist
  const rondasHoy = stats.rondasHoy || 0;
  const pct = Math.min(100, Math.round(rondasHoy / rondasTotal * 100));
  if(ctx4) new Chart(ctx4, { type:"doughnut",
    data:{ labels:["Completadas","Pendientes"], datasets:[{ data:[pct, 100-pct], backgroundColor:["#0fb8c9","#1e3251"], borderWidth:0 }] },
    options:{ ...chartOpts, plugins:{ legend:{labels:{color:"#8da4bc",font:{size:11}}}, tooltip:{callbacks:{label:ctx=>ctx.label+": "+ctx.raw+"%"}} } } });
}

async function enviarPedido() {
  const nombre = document.getElementById("f-nombre").value.trim();
  const desc = document.getElementById("f-desc").value.trim();
  if (!nombre || !desc) {
    mostrarMsgPedido("warning", "⚠ Completar nombre y descripción antes de enviar.");
    return;
  }

  const btn = document.querySelector("button[onclick='enviarPedido()']");
  if (btn) { btn.disabled = true; btn.textContent = "Enviando..."; }

  const res = await api({
    action:"nuevoPedido",
    servicio: state.servicio || state.nombre,
    solicitante: nombre,
    descripcion: desc + (document.getElementById("f-sector").value ? " — Sector: "+document.getElementById("f-sector").value : ""),
    urgencia: document.getElementById("f-urg").value,
  });

  if (btn) { btn.disabled = false; btn.innerHTML = "📋 Enviar solicitud"; }

  if (res && res.ok !== false) {
    mostrarMsgPedido("success", "✓ Pedido registrado correctamente. Referencia: " + (res.id || "OK"));
    document.getElementById("f-nombre").value = "";
    document.getElementById("f-desc").value = "";
    document.getElementById("f-sector").value = "";
  } else {
    mostrarMsgPedido("danger", "✗ Error al enviar: " + (res?.error || "verificar conexión con el servidor"));
  }
}

  if (btn) { btn.disabled = true; btn.textContent = "Guardando..."; }

    cargarNovedades();
  } else {
    mostrarMsgNovedad("danger","✗ Error al guardar: " + (res?.error || "verificar conexión"));

async function cargarNovedades() {
  const lista = document.getElementById("novedades-lista");
  if (!lista) return;
  lista.innerHTML = `<div class="card-title">Novedades del día — todos los turnos</div><div class="text-muted" style="font-size:13px">Cargando...</div>`;

  const hoy = new Date().toLocaleDateString("es-AR"); // dd/mm/yyyy

  // Cargar novedades manuales y pedidos cerrados hoy en paralelo
  const [novedadesData, pedidosData] = await Promise.all([
    api({ action:"getNovedades" }),
    api({ action:"getPedidos" })
  ]);

  const items = [];

  // Novedades manuales de hoy
  if (Array.isArray(novedadesData)) {
    novedadesData
      .filter(n => n.Fecha === hoy)
      .forEach(n => items.push({
        hora: n.Hora || "",
        turno: n.Turno || "",
        operario: n.Operario || "",
        texto: n.Novedad || "",
        tipo: n.Tipo || "General",
        icono: n.Tipo === "Urgente" ? "🔴" : n.Tipo === "Pendiente para siguiente turno" ? "⏳" : n.Tipo === "Equipos" ? "⚙️" : "📝"
      }));
  }

  // Pedidos cerrados hoy — se agregan automáticamente como novedad
  if (Array.isArray(pedidosData)) {
    pedidosData
      .filter(p => p.Estado === "Resuelto" && p.FechaCierre && p.FechaCierre.startsWith(hoy.split("/").reverse().join("/") ) )
      .forEach(p => {
        const horaCierre = p.FechaCierre ? p.FechaCierre.split(" ")[1] || "" : "";
        items.push({
          hora: horaCierre,
          turno: "",
          operario: p.OperarioAsignado || "",
          texto: `✓ Resuelto: ${p.Descripcion || ""} (Servicio: ${p.Servicio || ""})${p.Materiales ? " — Materiales: " + p.Materiales : ""}`,
          tipo: "Trabajo realizado",
          icono: "✅"
        });
      });
  }

  // También pedidos por fecha en formato dd/mm/yyyy
  if (Array.isArray(pedidosData)) {
    pedidosData
      .filter(p => p.Estado === "Resuelto" && p.Fecha === hoy)
      .forEach(p => {
        const yaAgregado = items.some(i => i.texto && i.texto.includes(p.Descripcion || "___"));
        if (!yaAgregado) {
          items.push({
            hora: p.Hora || "",
            turno: "",
            operario: p.OperarioAsignado || "",
            texto: `✓ Resuelto: ${p.Descripcion || ""} (Servicio: ${p.Servicio || ""})${p.Materiales ? " — Materiales: " + p.Materiales : ""}`,
            tipo: "Trabajo realizado",
            icono: "✅"
          });
        }
      });
  }

  // Ordenar por hora
  items.sort((a, b) => (b.hora || "").localeCompare(a.hora || ""));

  lista.innerHTML = `<div class="card-title">Novedades del día — todos los turnos</div>` +
    (items.length === 0
      ? `<div class="text-muted" style="font-size:13px">Sin novedades registradas hoy.</div>`
      : items.map(n => `
        <div style="padding:9px 0; border-bottom:1px solid rgba(45,125,210,.08);">
          <div style="font-size:11px;color:var(--text3);margin-bottom:3px">
            ${n.icono} ${n.hora} ${n.turno ? "· " + n.turno : ""} · <strong style="color:var(--text2)">${n.operario}</strong> · <em>${n.tipo}</em>
          </div>
          <div style="font-size:13px">${n.texto}</div>
        </div>`).join(""));
}

function getTurnoActual() {
  const h = new Date().getHours();
  if (h >= 7 && h < 13) return "Mañana";
  if (h >= 13 && h < 21) return "Tarde";
  return "Noche";
}

function updateRondaItem(si, ii) {
  const checked = document.querySelectorAll('.ronda-item input[type=checkbox]:checked').length;
  const total = document.querySelectorAll('.ronda-item input[type=checkbox]').length;
  const prog = document.getElementById("ronda-progress");
  if (prog) prog.textContent = checked + " / " + total + " ítems completados";
}

async function enviarRonda() {
  const checks = document.querySelectorAll('.ronda-item input[type=checkbox]');
  const items = [];
  checks.forEach((cb, idx) => {
    const parts = cb.id.replace("ri-","").split("-");
    const si = parts[0]; const ii = parts[1];
    const sel = document.getElementById(`rs-${si}-${ii}`);
    const obs = document.getElementById(`ro-${si}-${ii}`);
    if (cb.checked) {
      items.push({ sector: sel?.closest(".ronda-item")?.querySelector("strong")?.textContent || "",
        equipo: "-", tarea: sel?.closest(".ronda-item")?.querySelectorAll("div")[0]?.lastChild?.textContent?.trim() || "",
        resultado: sel?.value || "Normal", observaciones: obs?.value || "" });
    }
  });
  if (items.length === 0) { showAlert("warning","Completar al menos un ítem antes de guardar"); return; }
  const res = await api({ action:"registrarRonda", turno:getTurnoActual(), operario:state.nombre, items });
  if (res && res.ok !== false) showAlert("success","✓ Ronda registrada — " + items.length + " ítems guardados");
  else showAlert("danger","Error al guardar ronda");
}
